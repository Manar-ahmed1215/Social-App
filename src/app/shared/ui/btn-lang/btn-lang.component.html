<div class="relative inline-block text-left">

  <input type="checkbox" id="lang_dropdown_toggle" class="hidden peer">

  <label for="lang_dropdown_toggle"
    class="flex items-center gap-x-2 bg-white px-4 py-2.5 rounded-xl border border-gray-200 shadow-sm hover:border-maincolor cursor-pointer transition-all duration-300 select-none">

    <i class="fa-solid fa-globe text-maincolor text-lg"></i>
    <span class="text-xs font-bold uppercase text-gray-500">{{ currentLang }}</span>
    <i
      class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-300 peer-checked:rotate-180"></i>
  </label>

  <div class="absolute right-0 mt-2 w-48 origin-top-right bg-white rounded-2xl shadow-2xl border border-gray-100 opacity-0 invisible translate-y-2 transition-all duration-300 z-50 overflow-hidden 
              peer-checked:opacity-100 peer-checked:visible peer-checked:translate-y-0">

    <div class="p-2 space-y-1">

      <button (click)="changeLang('en')"
        class="flex items-center justify-between w-full px-4 py-3 rounded-lg text-sm transition-all duration-200"
        [class]="currentLang === 'en' ? 'bg-maincolor text-white shadow-md' : 'text-gray-600 hover:bg-maincolor-80 hover:text-maincolor'">
        <span>English</span>

      </button>

      <button (click)="changeLang('ar')"
        class="flex items-center justify-between w-full px-4 py-3 rounded-lg text-sm transition-all duration-200"
        [class]="currentLang === 'ar' ? 'bg-maincolor text-white shadow-md' : 'text-gray-600 hover:bg-maincolor-80 hover:text-maincolor'">
        <span>العربية</span>

      </button>

    </div>
  </div>

  <label for="lang_dropdown_toggle"
    class="fixed inset-0 h-full w-full cursor-default hidden peer-checked:block z-40"></label>
</div>
